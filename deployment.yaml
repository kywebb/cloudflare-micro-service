apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service-deployment
spec:
  replicas: 3
  selector:
    matchLabels:        
      app: audit-service 
  template:             
    metadata:
      labels:
        app: audit-service
    spec:
      containers:
      - name: audit-service
        image: audit-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080